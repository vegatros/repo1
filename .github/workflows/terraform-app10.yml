name: Terraform App10

run-name: app10-${{ inputs.environment }}-${{ inputs.action }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: ${{ inputs.environment }} - ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        working-directory: terraform/stacks/builds/app10
        run: terraform init -reconfigure
      
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'terraform/stacks/builds/app10'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
      
      - name: Terraform Plan
        working-directory: terraform/stacks/builds/app10
        run: terraform plan -var-file="vars/${{ inputs.environment }}.tfvars" -out=tfplan
      
      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: terraform/stacks/builds/app10
        run: terraform apply -auto-approve tfplan

      - name: Clone NanoClaw repo
        if: inputs.action == 'apply'
        run: git clone --depth 1 https://github.com/qwibitai/nanoclaw.git /tmp/nanoclaw

      - name: Login to ECR
        if: inputs.action == 'apply'
        run: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 925185632967.dkr.ecr.us-east-1.amazonaws.com

      - name: Get ECR Repository URL
        if: inputs.action == 'apply'
        id: ecr
        working-directory: terraform/stacks/builds/app10
        run: echo "repo_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        if: inputs.action == 'apply'
        run: |
          docker build -t nanoclaw-base -f /tmp/nanoclaw/container/Dockerfile /tmp/nanoclaw/container
          docker build -t nanoclaw --build-arg BASE_IMAGE=nanoclaw-base -f terraform/stacks/builds/app10/container/Dockerfile terraform/stacks/builds/app10/container
          docker tag nanoclaw:latest ${{ steps.ecr.outputs.repo_url }}:latest
          docker tag nanoclaw:latest ${{ steps.ecr.outputs.repo_url }}:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.repo_url }}:latest
          docker push ${{ steps.ecr.outputs.repo_url }}:${{ github.sha }}

      - name: Force ECS Redeployment
        if: inputs.action == 'apply'
        run: |
          CLUSTER="nanoclaw-${{ inputs.environment }}"
          SERVICE="${CLUSTER}-service"
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --force-new-deployment --region us-east-1

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        working-directory: terraform/stacks/builds/app10
        run: terraform destroy -var-file="vars/${{ inputs.environment }}.tfvars" -auto-approve
