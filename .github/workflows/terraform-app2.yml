name: Terraform App2

run-name: app2-${{ inputs.environment }}-${{ inputs.action }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: ${{ inputs.environment }} - ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        working-directory: terraform/stacks/app2
        run: |
          terraform init \
            -backend-config="key=stacks/app2/${{ inputs.environment }}/terraform.tfstate" \
            -reconfigure
      
      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/stacks/app2
          framework: terraform
          output_format: cli
          soft_fail: true
      
      - name: Run SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      
      - name: Terraform Plan
        working-directory: terraform/stacks/app2
        run: terraform plan -var-file="${{ inputs.environment }}.tfvars" -out=tfplan
      
      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: terraform/stacks/app2
        run: terraform apply -auto-approve tfplan
      
      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        working-directory: terraform/stacks/app2
        run: terraform destroy -var-file="${{ inputs.environment }}.tfvars" -auto-approve
