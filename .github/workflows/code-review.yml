name: Claude Code Review

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    name: Claude Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get changed files
        id: changed
        run: |
          CHANGED_FILES=$(git diff --name-only origin/master...HEAD | tr '\n' ' ')
          echo "files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "Reviewing: $CHANGED_FILES"

      - name: Run code review
        if: steps.changed.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          REVIEW_PROMPT="Review the following changed files for security vulnerabilities, best practices, performance, error handling, and correctness. For each finding, assign a severity (High/Medium/Low) and provide actionable fixes with specific file and line references. End with a summary table of findings by severity.

          Changed files: ${{ steps.changed.outputs.files }}"

          claude -p "$REVIEW_PROMPT" --output-format text --max-turns 10 > review.md

      - name: Post review as PR comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');

            if (review.trim().length === 0) {
              console.log('No review output to post.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Claude Code Review\n\n${review}`
            });
