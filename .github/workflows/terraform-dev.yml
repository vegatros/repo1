name: Terraform Dev ${{ github.event.inputs.action }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Dev - ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        working-directory: terraform/ec2
        run: |
          terraform init \
            -backend-config="key=ec2/dev/terraform.tfstate" \
            -reconfigure
      
      - name: Terraform Plan
        working-directory: terraform/ec2
        run: terraform plan -var-file="dev.tfvars" -out=tfplan
      
      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: terraform/ec2
        run: terraform apply -auto-approve tfplan
      
      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        working-directory: terraform/ec2
        run: terraform destroy -var-file="dev.tfvars" -auto-approve
