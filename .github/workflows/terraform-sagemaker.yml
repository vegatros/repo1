name: Terraform SageMaker

run-name: sagemaker-${{ inputs.environment }}-${{ inputs.action }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: ${{ inputs.environment }} - ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/stacks/aws/builds/app-sagemaker
        run: terraform init -reconfigure

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'terraform/stacks/aws/builds/app-sagemaker'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'

      - name: Terraform Plan
        working-directory: terraform/stacks/aws/builds/app-sagemaker
        run: terraform plan -var-file="vars/${{ inputs.environment }}.tfvars" -out=tfplan

      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: terraform/stacks/aws/builds/app-sagemaker
        run: terraform apply -auto-approve tfplan

      - name: Trigger Pipeline Execution
        if: inputs.action == 'apply'
        working-directory: terraform/stacks/aws/builds/app-sagemaker
        run: |
          BUCKET="sagemaker-pipeline-$(aws sts get-caller-identity --query Account --output text)"

          # Upload processing script
          aws s3 cp scripts/preprocess.py s3://$BUCKET/scripts/preprocess.py

          # Upload sample data if input is empty
          COUNT=$(aws s3 ls s3://$BUCKET/input/ 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "feature1,feature2,feature3,label
          1.0,2.0,3.0,0
          4.0,5.0,6.0,1
          7.0,8.0,9.0,0
          2.0,3.0,4.0,1
          5.0,6.0,7.0,0
          8.0,9.0,10.0,1" | aws s3 cp - s3://$BUCKET/input/sample.csv
          fi

          # Trigger pipeline
          EXECUTION_ARN=$(aws sagemaker start-pipeline-execution \
            --pipeline-name sagemaker-pipeline-pipeline \
            --query 'PipelineExecutionArn' --output text)
          echo "Pipeline started: $EXECUTION_ARN"

          # Wait for completion (max 10 min)
          for i in $(seq 1 20); do
            sleep 30
            STATUS=$(aws sagemaker describe-pipeline-execution \
              --pipeline-execution-arn "$EXECUTION_ARN" \
              --query 'PipelineExecutionStatus' --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "Succeeded" ]; then
              echo "Pipeline succeeded!"
              aws s3 ls s3://$BUCKET/output/ --recursive
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "Pipeline failed!"
              aws sagemaker list-pipeline-execution-steps \
                --pipeline-execution-arn "$EXECUTION_ARN" \
                --query 'PipelineExecutionSteps[0].FailureReason' --output text
              exit 1
            fi
          done
          echo "Pipeline timed out"
          exit 1

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        working-directory: terraform/stacks/aws/builds/app-sagemaker
        run: terraform destroy -var-file="vars/${{ inputs.environment }}.tfvars" -auto-approve
