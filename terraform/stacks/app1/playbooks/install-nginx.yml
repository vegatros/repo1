---
- name: Install and configure Nginx
  hosts: localhost
  connection: local
  become: yes
  tasks:
    - name: Enable nginx in amazon-linux-extras
      command: amazon-linux-extras enable nginx1
      changed_when: false
    
    - name: Install nginx
      yum:
        name: nginx
        state: present
    
    - name: Start nginx service
      service:
        name: nginx
        state: started
        enabled: yes
    
    - name: Create custom index page
      copy:
        content: |
          <html>
          <head><title>Ansible Nginx Test</title></head>
          <body>
            <h1>Nginx installed successfully via Ansible!</h1>
            <p>Server: {{ ansible_hostname }}</p>
            <p>IP: {{ ansible_default_ipv4.address }}</p>
          </body>
          </html>
        dest: /usr/share/nginx/html/index.html
        mode: '0644'
